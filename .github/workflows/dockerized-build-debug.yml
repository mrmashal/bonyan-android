name: Dockerized Build Debug

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}

    - name: Build Docker image
      run: docker build -t telegram-builder .

    - name: Build APK in Docker
      run: |
        # Run the container and mount the workspace to /home/source
        docker run --rm -v ${{ github.workspace }}:/home/source telegram-builder

        # Fix file permissions since the container might run as root
        sudo chown -R $USER:$USER ${{ github.workspace }}/TMessagesProj/build/outputs/apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Telegram-Debug-APK
        path: TMessagesProj/build/outputs/apk/**/*.apk
        if-no-files-found: warn